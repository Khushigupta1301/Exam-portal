<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}University Exam Form Portal{% endblock %}</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1d4ed8;
      --bg-3: #14b8a6;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #0f766e;
      --danger: #dc2626;
      --border: rgba(15, 23, 42, 0.12);
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.18);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.26), transparent 30%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.28), transparent 34%),
        linear-gradient(145deg, var(--bg-1), #111827 45%, #0f172a 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent 85%);
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: stretch;
      margin-top: 16px;
    }

    .brand, .panel {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      padding: 34px;
      color: white;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(20, 184, 166, 0.82)),
        var(--bg-2);
      position: relative;
      overflow: hidden;
    }

    .brand::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      filter: blur(6px);
    }

    .brand h1, .page-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: 0.2px;
    }

    .brand h1 {
      font-size: clamp(2.2rem, 4vw, 4rem);
      line-height: 0.98;
      max-width: 11ch;
    }

    .brand p {
      max-width: 56ch;
      font-size: 1.02rem;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.9);
    }

    .feature-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white;
      font-size: 0.92rem;
    }

    .panel {
      padding: 28px;
      animation: rise 0.6s ease both;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      font-family: Georgia, "Times New Roman", serif;
    }

    .panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .card {
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
      animation: rise 0.6s ease both;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #1e293b;
    }

    .field input, .field textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(15, 23, 42, 0.14);
      background: rgba(255, 255, 255, 0.96);
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .field input:focus, .field textarea:focus {
      border-color: rgba(37, 99, 235, 0.6);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    .portal-input {
      width: 100%;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn, button, .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover, button:hover, .btn-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.14);
    }

    .btn-primary, button {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.22);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
    }

    .btn-danger {
      color: white;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .muted {
      color: var(--muted);
    }

    .alert {
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 16px;
      background: rgba(220, 38, 38, 0.08);
      color: #991b1b;
      border: 1px solid rgba(220, 38, 38, 0.14);
    }

    .success-banner {
      border-radius: 18px;
      padding: 18px 20px;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.14), rgba(37, 99, 235, 0.11));
      border: 1px solid rgba(37, 99, 235, 0.12);
      color: #0f172a;
    }

    .two-up {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .info-tile {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 16px;
    }

    .info-tile .label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .info-tile .value {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .page-wrap {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 64px);
      padding: 24px 0;
    }

    .login-layout {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }

    .login-card {
      min-height: 100%;
    }

    .small-note {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .toolbar .mini-title {
      font-size: 0.92rem;
      color: white;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 0 0 10px;
    }

    .toolbar .subtitle {
      margin: 0;
      color: rgba(255, 255, 255, 0.85);
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 12px 14px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .hero, .login-layout, .two-up {
        grid-template-columns: 1fr;
      }

      .shell {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
      }

      .brand, .panel, .card {
        padding: 22px;
      }
    }

    @media (max-width: 560px) {
      .brand h1 {
        font-size: 2.1rem;
      }

      .panel h2, .page-title {
        font-size: 1.55rem;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="shell">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
